<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camp Half-Blood</title>
        <!-- cool greek font -->
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@400;700&display=swap" 
        rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header class="hud-header">
            <h1>Camp Half-Blood</h1>
            <p>Cook some Monsters for Dinner MAN!!</p>
        </header>
        <div class="map-wrapper">
          <img src="Camp-Map.png" alt="Camp Map" class="high-res-map">

          <div class="star" id="thalias-tree" style="top: 45.7%; left: 86.5%;">⭐</div>
          <div class="star" id="canoe-lake" style="top: 37%; left: 68.5%;">⭐</div>
          <div class="star" id="combat-area" style="top: 68%; left: 41.5%">⭐</div>
          <div class="star" id="big-house" style="top: 78%; left:61%">⭐</div>
          <div class="star" id="long-island" style="top: 13.5%; left: 17.5%;">⭐</div>
        </div>
        <div id="info-scroll" class="scroll-popup hidden">
            <button id="close-btn" class="close-btn">X</button>
            <h2 id="scroll-title">Location Name</h2>
            <p id="scroll-text">Location description will go here...</p>
        </div>

        <script src="app.js"></script>
    </body>
    </html>
