<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Camp Half-Blood</title>
        <!-- cool greek font -->
         <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" 
         rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="ui-layer">
            <h1 id="scoreEl">Monsters Defeated: 0</h1>
            <h2 id="healthEl">Tree Health: 100%</h2>
            <h2 id="waveEl" style="color: #684e0d; margin-top: 5px;">WAVE: 1</h2>
            <h2 style="color: #3b8ef3; margin-top: 10px;">Zeus's Wrath</h2>
        <div style="width: 200px; height: 15px; border: 2px solid #60a5fa; margin: 0 auto;">
            <div id="cooldownBar" style="width: 100%; height: 100%; background: #60a5fa;"></div>
        </div>
        <div id="gameOverUI" class="hidden">
            <h1 style="color: #ee1f1f; font-size: 4rem; margin: 0;">The Tree died bruh 🥀</h1>
            <h2 id="finalScore">Monsters Cooked: 0</h2>
            <button onclick="location.reload()" class-="action-btn">SKILL ISSUE 🤡</button>
        </div>

        <canvas id="gameCanvas"></canvas>

        <script src="app.js"></script>
    </body>
    </html>
